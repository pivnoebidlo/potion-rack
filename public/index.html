<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potion Rack</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="header">
    <h1 id="appTitle">🎨 Potion Rack</h1>
    <div class="stats">
        <div class="stat">
            <div class="stat-value" id="totalCount">0</div>
            <div class="stat-label" id="statsTotalLabel">Total Paints</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="brandCount">0</div>
            <div class="stat-label" id="statsBrandsLabel">Brands</div>
        </div>
    </div>
</div>

<div class="app-container">
    <!-- Left sidebar navigation -->
    <div class="left-sidebar">
        <div class="nav-item active" data-tab="paints" title="Paints">🎨</div>
        <div class="nav-item" data-tab="figures" title="Figures">🧩</div>
        <div class="nav-item" data-tab="settings" title="Settings">⚙️</div>
    </div>

    <!-- Main content -->
    <div class="main-container">
        <!-- Paints View -->
        <div id="paints-view" class="view active">
            <div class="toolbar">
                <div class="filter-row">
                    <div class="filter-group">
                        <label id="labelBrand" for="filter-brand">Brand</label>
                        <select id="filter-brand" style="min-width: 110px;"></select>
                    </div>
                    <div class="filter-group">
                        <label id="labelSeries" for="filter-series">Series</label>
                        <select id="filter-series" style="min-width: 110px;"></select>
                    </div>
                    <div class="filter-group">
                        <label id="labelBaseColor" for="filter-base-color">Base Color</label>
                        <select id="filter-base-color" style="min-width: 110px;"></select>
                    </div>
                    <div class="filter-group">
                        <label id="labelSearch" for="filter-color-name">Search</label>
                        <input type="text" id="filter-color-name" placeholder="Color name..." style="min-width: 120px;">
                    </div>
                    <div class="filter-group">
                        <label id="labelStatus" for="filter-status">Status</label>
                        <select id="filter-status" style="min-width: 100px;">
                            <option value="">All</option>
                            <option value="instock">✅ In Stock</option>
                            <option value="low">⚠️ Low</option>
                            <option value="out">❌ Out of Stock</option>
                            <option value="ordered">📦 Ordered</option>
                        </select>
                    </div>
                    <div class="action-buttons">
                        <button id="resetFiltersBtn" class="icon-btn" title="Reset filters">🔄</button>
                        <button id="addBtn" class="primary icon-btn" title="Add paint">➕</button>
                        <label for="languageSwitcher" class="visually-hidden">Language</label>
                        <select id="languageSwitcher" class="language-switcher">
                            <option value="en">🇬🇧 EN</option>
                            <option value="ru">🇷🇺 RU</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                    <tr>
                        <th id="thBrand">Brand</th>
                        <th id="thSeries">Series</th>
                        <th id="thColor">Color Name</th>
                        <th id="thArticle">Article</th>
                        <th id="thBaseColor">Base Color</th>
                        <th id="thPurchaseDate">Purchase Date</th>
                        <th id="thRating">Rating</th>
                        <th id="thStatus">Status</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody id="tableBody">
                    <tr><td colspan="9" class="loading">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Figures View (placeholder) -->
        <div id="figures-view" class="view">
            <div style="display: flex; justify-content: center; align-items: center; height: 100%; color: #aaa; flex-direction: column; gap: 20px;">
                <div style="font-size: 48px;">🧩</div>
                <div style="font-size: 16px;">Figures feature coming soon!</div>
                <div style="font-size: 12px;">Track your miniatures and paint usage</div>
            </div>
        </div>

        <!-- Settings View -->
        <div id="settings-view" class="view">
            <!-- Settings content will be injected here by JS -->
        </div>
    </div>

    <!-- Right panel -->
    <div class="resize-handle" id="resizeHandle"></div>
    <div class="right-panel" id="rightPanel">
        <div class="right-panel-header">
            <button id="collapsePanelBtn" class="collapse-btn" title="Toggle details panel">◀</button>
        </div>
        <div class="right-panel-content" id="detailsContent">
            <div class="details-value">Select a paint to see details</div>
        </div>
    </div>
</div>

<div class="status-message" id="statusMessage">Ready</div>

<script type="module" src="../dist/renderer/index.js"></script>
</body>
</html>
