name: Build Potion Rack

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build for Windows (x64)
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install node-gyp
        run: npm install -g node-gyp

      - name: Install setuptools
        run: pip install setuptools

      - name: Install Windows build tools
        run: |
          choco install visualstudio2022-buildtools --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended"
          choco install python

      - name: Install dependencies
        run: npm ci

      - name: Rebuild better-sqlite3 for Electron
        run: npm rebuild better-sqlite3 --runtime=electron --target=35.7.5 --disturl=https://electronjs.org/headers --build-from-source

      - name: Build TypeScript
        run: npm run build

      - name: Build Windows app
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: potion-rack-windows
          path: |
            release/*.exe

  build-macos:
    name: Build for macOS (ARM64)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install node-gyp
        run: npm install -g node-gyp

      - name: Install setuptools
        run: pip install setuptools

      - name: Install dependencies
        run: npm ci

      - name: Rebuild better-sqlite3 for Electron
        run: npm rebuild better-sqlite3 --runtime=electron --target=35.7.5 --disturl=https://electronjs.org/headers --build-from-source

      - name: Build TypeScript
        run: npm run build

      - name: Build macOS app
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Ad-hoc sign
        run: |
          codesign --force --deep --sign - "release/mac-arm64/Potion Rack.app" || \
          codesign --force --deep --sign - "release/mac/Potion Rack.app" || \
          echo "No .app found for signing — skipping"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: potion-rack-macos
          path: |
            release/*.dmg
            release/*.zip

  build-linux:
    name: Build for Linux (x64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install node-gyp
        run: npm install -g node-gyp

      - name: Install setuptools
        run: pip install setuptools

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Install dependencies
        run: npm ci

      - name: Rebuild better-sqlite3 for Electron
        run: npm rebuild better-sqlite3 --runtime=electron --target=35.7.5 --disturl=https://electronjs.org/headers --build-from-source

      - name: Build TypeScript
        run: npm run build

      - name: Build Linux app
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: potion-rack-linux
          path: |
            release/*.AppImage
            release/*.deb

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-artifacts/potion-rack-windows/*
            release-artifacts/potion-rack-macos/*
            release-artifacts/potion-rack-linux/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}